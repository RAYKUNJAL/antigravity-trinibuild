name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    env:
      HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
      HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
    steps:
      - name: Skip deploy when Hetzner secrets are missing
        if: ${{ env.HETZNER_HOST == '' || env.HETZNER_SSH_KEY == '' }}
        run: |
          echo "::notice::Skipping Hetzner deploy because HETZNER_HOST or HETZNER_SSH_KEY is not configured in GitHub Actions secrets."
          echo "Add repository secrets HETZNER_HOST and HETZNER_SSH_KEY to enable deployment."

      - name: Deploy via SSH
        if: ${{ env.HETZNER_HOST != '' && env.HETZNER_SSH_KEY != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.HETZNER_HOST }}
          username: root
          key: ${{ env.HETZNER_SSH_KEY }}
          script: |
            cd /var/www/trinibuild
            git pull origin main
            npm ci --ignore-scripts
            npm run build
            cd server && npm install --omit=dev && cd ..
            pm2 restart trinibuild-api
            echo "Deployed $(git rev-parse --short HEAD)"
